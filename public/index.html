<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Local Dev Template</title>
        <link rel="stylesheet" href="./css/style.css" />
    </head>
    <body>
        <main class="container">
            <h1>ローカル開発テンプレート:サーバー構築検証用</h1>

            <section class="card">
                <h2>① ユーザーを登録してみましょう♪</h2>
                <form id="user-form">
                    <div>
                    <label>
                        ユーザー名
                        <input type="text" id="name" name="name" required />
                    </label>
                    </div>
                    <div>
                    <label>
                        メールアドレス
                        <input type="email" id="email" name="email" required />
                    </label>
                </div>
                    <button type="submit">登録する</button>
                    <div id="submit-status"></div>
                </form>
            </section>

            <section class="card">
                <h2>② ユーザーを検索することができます！</h2>
                <input type="text" id="search" placeholder="ユーザー名またはメールアドレスで検索" />
                <button id="reload-button">再読込み</button>
            </section>
            
            <section class="card">
                <h2>③ ユーザーの一覧を確認できます。</h2>
                <div id="data-status"></div>
                <ul id="user-list"></ul>
                <h3>TODO. ユーザー情報をテーブルで表示してみよう</h3>
                <div style="display: flex; justify-content: flex-end;">
                    <button id="open-edit-modal-button">編集する</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ユーザー名</th>
                            <th>メールアドレス</th>
                            <th>編集</th>
                        </tr>    
                    </thead>
                    <tbody id="user-table">
                    </tbody>
                </table>
                <dialog id="edit-modal">
                    <div style="display: flex; justify-content: flex-end;">
                        <button id="close-modal">×</button>
                    </div>
                    <h3>TODO.編集可能なフォームを作成しよう</h3>
                    <h2>メールアドレスの編集ができます。</h2>
                    <form id="edit-user-form">
                        <input type="hidden" id="edit-user-id" name="id" />
                        <label>
                            ユーザー名
                            <input type="text" id="edit-name" name="name" disabled />
                        </label>
                        <label>
                            メールアドレス
                            <input type="email" id="edit-email" name="email" required />
                        </label>
                        <div style="display: flex; justify-content: center; gap: 10px;">
                            <button style="background-color: darkgray;">キャンセル</button>
                            <button id="edit-submit">保存</button>
                        </div>
                    </form>
                </dialog>
                <form>
                    <fieldset>
                        <legend>１つだけ選択できるかラジオボタンを確認する</legend>
                        <div>
                            <label>選択1<input type="radio" name="radioGroup" /></label>
                            <label>選択2<input type="radio" name="radioGroup" /></label>
                            <label>選択3<input type="radio" name="radioGroup" /></label>
                        </div>
                    </fieldset>
                </form>   
            </section>
        </main>

        <script type="module" src="/js/app.js"></script>
    </body>
</html>
